# Greetmate 実行設定
cache:
  expireSeconds: 5
log:
  rotationIntervalHours: 0.01
  retentionDays: 1
maintenance:
  cleanupIntervalHours: 0.01
  cleanupThresholdDays: 1
  syncIntervalSeconds: 10
default:
  loginMessage: "%s さんがログインしました！"
  logoutMessage: "%s さんがログアウトしました！"
  kickMessage: "%s さんがキックされました！"
  banMessage: "%s さんがBANされました！"
