# 監視 Helm values
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: "null"
      group_by:
        - alertname
        - namespace
        - severity
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal:
          - alertname
          - namespace
      - source_matchers:
          - alertname = "CephHealthError"
        target_matchers:
          - alertname = "CephHealthWarn"
    receivers:
      - name: "null"
  service:
    loadBalancerIP: 192.168.11.72
    type: LoadBalancer
  servicePerReplica:
    type: LoadBalancer
  alertmanagerSpec:
    alertmanagerConfigMatcherStrategy:
      type: None
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs-storage-class
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
grafana:
  deploymentStrategy:
    type: Recreate
  persistence:
    enabled: true
    type: pvc
    existingClaim: grafana-pvc
  initChownData:
    enabled: false
  defaultDashboardsTimezone: jst
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.11.73
prometheus:
  thanosService:
    type: LoadBalancer
  service:
    loadBalancerIP: 192.168.11.74
    type: LoadBalancer
  servicePerReplica:
    type: LoadBalancer
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: cephfs-storage-class
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
    securityContext:
      runAsGroup: 0
      runAsNonRoot: false
      runAsUser: 0
      fsGroup: 0
