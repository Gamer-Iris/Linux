apiVersion: v1
kind: Service
metadata:
  name: minecraft-server1
  namespace: minecraft
  labels:
    app: minecraft-server1
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.11.78
  ports:
    - name: bluemap-port
      port: 8100
      protocol: TCP
      targetPort: 8100
    - name: minecraft-port
      port: 25565
      protocol: TCP
      targetPort: 25565
    - name: minecraft-rcon
      port: 25575
      protocol: TCP
      targetPort: 25575
  selector:
    app: minecraft-server1
