# Minecraft server Deployment 設定
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server1
  namespace: minecraft
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minecraft-server1
  template:
    metadata:
      labels:
        app: minecraft-server1
    spec:
      terminationGracePeriodSeconds: 120
      volumes:
        - name: minecraft-server1-volumes
          persistentVolumeClaim:
            claimName: minecraft-server1-pvc
        - name: minecraft-backup1-volumes
          persistentVolumeClaim:
            claimName: minecraft-backup1-pvc
      containers:
        - name: minecraft-server1
          image: itzg/minecraft-server:java25
          env:
            - name: TYPE
              value: PAPER
            - name: EULA
              value: "TRUE"
            - name: LEVEL
              value: "26.1.2"
            - name: VERSION
              value: "26.1.2"
            - name: DIFFICULTY
              value: "hard"
            - name: ENFORCE_SECURE_PROFILE
              value: "FALSE"
            - name: MAX_PLAYERS
              value: "10"
            - name: MAX_TICK_TIME
              value: "-1"
            - name: MODE
              value: "survival"
            - name: MOTD
              value: "MC-Kuvernetes-1"
            - name: ONLINE_MODE
              value: "FALSE"
            - name: ENABLE_WHITELIST
              value: "TRUE"
            - name: SPAWN_PROTECTION
              value: "0"
            - name: SERVER_NAME
              value: "minecraft.server1.com"
            - name: TZ
              value: "Asia/Tokyo"
            - name: MEMORY
              value: "12G"
            - name: ENABLE_RCON
              value: "true"
            - name: RCON_PORT
              value: "25575"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-secret
                  key: RCON_PASSWORD_SERVER1
            - name: MINECRAFT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: minecraft-secret
                  key: MINECRAFT_DB_URL1
            - name: MINECRAFT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: minecraft-secret
                  key: MINECRAFT_DB_USERNAME1
            - name: MINECRAFT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-secret
                  key: MINECRAFT_DB_PASSWORD1
          resources:
            limits:
              memory: "12Gi"
          volumeMounts:
            - name: minecraft-server1-volumes
              mountPath: /data
        - name: minecraft-backup-1
          image: itzg/mc-backup:latest
          imagePullPolicy: Always
          securityContext:
            runAsUser: 1000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          env:
            - name: INITIAL_DELAY
              value: "120"
            - name: BACKUP_INTERVAL
              value: "6h"
            - name: PRUNE_BACKUPS_DAYS
              value: "7"
            - name: TZ
              value: "Asia/Tokyo"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minecraft-secret
                  key: RCON_PASSWORD_SERVER1
          volumeMounts:
            - name: minecraft-server1-volumes
              mountPath: /data
              readOnly: true
            - name: minecraft-backup1-volumes
              mountPath: /backups
---
