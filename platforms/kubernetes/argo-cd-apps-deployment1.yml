# Argo CD アプリ定義
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-50"
spec:
  project: default
  source:
    repoURL: "git@github.com:Gamer-Iris/Linux.git"
    targetRevision: HEAD
    path: "./platforms/kubernetes/apps/namespaces"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: namespaces
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-driver-smb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-45"
spec:
  project: default
  source:
    repoURL: "https://raw.githubusercontent.com/kubernetes-csi/csi-driver-smb/master/charts"
    targetRevision: "*"
    chart: csi-driver-smb
    helm:
      values: |
        controller:
          runOnControlPlane: true
        windows:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storages
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-40"
spec:
  project: default
  source:
    repoURL: "git@github.com:Gamer-Iris/Linux.git"
    targetRevision: HEAD
    path: "./platforms/kubernetes/apps/storages"
    directory:
      exclude: "smb-pvc-navidrome-music.yml"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: storages
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
