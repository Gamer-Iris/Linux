######################################################################################################################################################
# ファイル   : settings_secret_template.yml
# 注意       : このファイルを settings_secret.yml にコピー後、chmod 600 で保護すること
# 概要       : インフラ構築共通設定ファイルテンプレート
#              cp platforms/settings/settings_secret_template.yml \
#                 platforms/settings/settings_secret.yml
#              を実行後、実際の値を記入して使用する
#              ※ settings_secret.yml は .gitignore 対象のため、コミット厳禁
#
# ----------------------------------------------------------------------------------------------------------------------------------------------------
# 【修正履歴】
# V-001      : 2026/06/27                 Gamer-Iris   新規作成
#
######################################################################################################################################################

# ****************************************************************************************************************************************************
# 共通認証（デフォルト値 / ホスト個別設定がない場合に使用）
# Kubernetes Secret へ転記して Minecraft Pod / Job から参照する
# ****************************************************************************************************************************************************
username: ご自分の環境に合わせてください。
password: ご自分の環境に合わせてください。
key: ~/.ssh/id_ed25519

# ****************************************************************************************************************************************************
# ノード定義（Ansible インベントリの唯一のソース）
# ****************************************************************************************************************************************************
nodes:
  control_plane:
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX
      username: ご自分の環境に合わせてください。 # 例: ubuntu-101
  workers:
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX
      username: ご自分の環境に合わせてください。 # 例: ubuntu-201
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX
      username: ご自分の環境に合わせてください。 # 例: ubuntu-301
  proxmox:
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX（pve-01）
      username: ご自分の環境に合わせてください。 # 例: pve-01
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX（pve-02）
      username: ご自分の環境に合わせてください。 # 例: pve-02
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX（pve-03）
      username: ご自分の環境に合わせてください。 # 例: pve-03
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX（pve-04）
      username: ご自分の環境に合わせてください。 # 例: pve-04
    - ip: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX（pve-05）
      username: ご自分の環境に合わせてください。 # 例: pve-05

# ****************************************************************************************************************************************************
# k8s 設定
# ****************************************************************************************************************************************************
kubernetes:
  # 注意: pod_network_cidr は LAN アドレス帯（例: 192.168.0.0/16）と重複させないこと。
  # 重複すると LAN 通信が k8s トンネルに引き込まれクラスタ外通信が失敗する。
  pod_network_cidr: 10.244.0.0/16
  cri_socket: unix:///run/containerd/containerd.sock

# ****************************************************************************************************************************************************
# データベース
# ※ DB 接続情報の唯一のソース。setup.sh secrets が SealedSecret manifest へ反映する
#
# oss     : DB 種別（例: mysql）。LuckPerms の storage-method に設定する
# address : DB サーバーの IP アドレス。全スクリプト共通で使用する
# root_password : MariaDB 初期構築 / phpMyAdmin 管理用途。runtime app は app 専用 user を使う
#
# database1 : BlueMap 用（server1）  → minecraft_conversion_bluemap.sh
# database2 : BlueMap 用（server2）  → minecraft_conversion_bluemap.sh
# database3 : LuckPerms 用           → minecraft_conversion_luckperms.sh
# database4 : WordPress 用           → wordpress-secret
# ****************************************************************************************************************************************************
databases:
  oss: ご自分の環境に合わせてください。 # 例: mysql
  address: ご自分の環境に合わせてください。 # 例: 192.168.XX.XX
  root_password: ご自分の環境に合わせてください。
  database1: # BlueMap 用（server1）
    databasename: ご自分の環境に合わせてください。
    username: ご自分の環境に合わせてください。
    password: ご自分の環境に合わせてください。
  database2: # BlueMap 用（server2）
    databasename: ご自分の環境に合わせてください。
    username: ご自分の環境に合わせてください。
    password: ご自分の環境に合わせてください。
  database3: # LuckPerms 用
    databasename: ご自分の環境に合わせてください。
    username: ご自分の環境に合わせてください。
    password: ご自分の環境に合わせてください。
  database4: # WordPress 用
    databasename: wordpress
    username: wordpress
    password: ご自分の環境に合わせてください。

# ****************************************************************************************************************************************************
# 通知・外部サービス
# ****************************************************************************************************************************************************
appnotice:
  ip: ご自分の環境に合わせてください。
  username: ご自分の環境に合わせてください。
discord:
  url: ご自分の環境に合わせてください。

# ****************************************************************************************************************************************************
# Kubernetes app SealedSecret 生成（DB 以外のアプリ固有 secret）
# ※ DB 接続情報は databases.* から SealedSecret に生成するため、ここでは管理しない
# ※ setup.sh secrets は SealedSecret manifest を生成し、承認時のみ Git 反映と sync を行う
# ****************************************************************************************************************************************************
app_secrets:
  monitoring:
    discord_webhook_url: "" # 空の場合は discord.url を使用
  cloudflare:
    token: ご自分の環境に合わせてください。
  minecraft:
    rcon_password_server1: ご自分の環境に合わせてください。
    rcon_password_server2: ご自分の環境に合わせてください。

# ****************************************************************************************************************************************************
# GitHub Webhooks / Actions / self-hosted runner
# ※ github.enabled: true の場合、setup.sh control-plane / all の control-plane 初期化時に self-hosted runner を自動設定する
# ※ webhook / workflow permission は runner 登録とは別機能のため、必要な場合のみ個別に有効化する
# ※ token は対象 repository に Repository access を限定した Fine-grained PAT を指定する
#   GitHub UI の New self-hosted runner に表示される ./config.sh --token は一時的な runner registration token のため指定しない
#   必須: Administration Read and write
#   任意: Webhooks Read and write（webhook_enabled=true の場合のみ。権限不足時は GitHub API が 403 を返す）
#   任意: Actions Read and write（dispatch_build_release=true の場合のみ）
#   Contents 権限は setup 実装では不要
# ****************************************************************************************************************************************************
github:
  enabled: false
  owner: Gamer-Iris
  repo: Linux
  token: "" # github.enabled=true の場合のみ設定。コミット厳禁。
  ssh_key_path: ~/.ssh/id_git_rsa # setup.sh secrets が SealedSecret commit を GitHub へ push する SSH 秘密鍵パス
  api_version: auto # GitHub REST API version。auto の場合は GitHub /versions から最新 supported version を自動選択する。
  webhook_enabled: false # Discord 向け GitHub webhook を自動作成する場合のみ true
  webhook_url: "" # GitHub webhook 受信用 URL。空の場合は discord.url + "/github" を使用
  webhook_secret: "" # webhook secret を設定する場合のみ指定。GitHub API では既存 secret を取得できないため、設定時は再適用する。
  workflow_permission_enabled: false # Actions workflow permission を read/write に自動設定する場合のみ true
  runner_name: linux-runner
  runner_labels: self-hosted
  runner_dir: "{{ ansible_user_dir }}/actions-runner"
  runner_reset: false # 初回登録または再登録時のみ true。登録後は false に戻す
  dispatch_build_release: false # Build and Release workflow を自動実行する場合のみ true
  build_release_workflow: build-release.yml
  build_release_ref: main

# ****************************************************************************************************************************************************
# SMB（TrueNAS）
# ※ Navidrome /music は TrueNAS SMB 共有 music（/mnt/tank/share-01/03-music）を使用する
# ****************************************************************************************************************************************************
smb:
  ip: ご自分の環境に合わせてください。
  username: ご自分の環境に合わせてください。
  password: ご自分の環境に合わせてください。

# ****************************************************************************************************************************************************
# Argo CD
# ※ apps_base フェーズ（Ansible ）で使用する
# deploy_key_path : GitHub Deploy Key の秘密鍵パス（README の「Argo CD 事前準備」で生成したもの）
# admin_password  : setup.sh が Argo CD admin に設定する新パスワード
# ****************************************************************************************************************************************************
argocd:
  deploy_key_path: ~/.ssh/argo # 例: ~/.ssh/argo
  admin_password: ご自分の環境に合わせてください。 # 例: MySecurePassword123
