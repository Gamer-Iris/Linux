######################################################################################################################################################
# Kubernetes app SealedSecret 生成
- name: SealedSecret manifest を settings_secret.yml から生成
  ansible.builtin.shell: |
    set -euo pipefail
    tmp_dir="$(mktemp -d)"
    cleanup() {
      if [[ -n "${tmp_dir:-}" && -d "${tmp_dir}" ]]; then
        tmp_parent="$(dirname -- "${tmp_dir}")"
        case "${tmp_parent}" in
          /tmp|/var/tmp|"${TMPDIR:-/tmp}") rm -rf -- "${tmp_dir:?}" ;;
          *) echo "ERROR: unsafe tmp_dir for cleanup: ${tmp_dir}" >&2; return 1 ;;
        esac
      fi
    }
    trap cleanup EXIT
    mkdir -p "{{ repo_root }}/platforms/kubernetes/apps/secrets"

    cat > "${tmp_dir}/alertmanager-discord-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: alertmanager-discord-secret
      namespace: monitoring
    type: Opaque
    stringData:
      webhook_url: {{ ((app_secrets | default({})).monitoring | default({})).discord_webhook_url | default(discord.url, true) | to_json }}
    EOF

    cat > "${tmp_dir}/cloudflare-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: cloudflare-secret
      namespace: cloudflare
    type: Opaque
    stringData:
      CLOUDFLARE_TOKEN: {{ ((app_secrets | default({})).cloudflare | default({})).token | default(((cloudflare | default({})).token | default('replace-me', true)), true) | to_json }}
    EOF

    cat > "${tmp_dir}/mariadb-phpmyadmin-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: mariadb-phpmyadmin-secret
      namespace: mariadb-phpmyadmin
    type: Opaque
    stringData:
      MYSQL_ROOT_PASSWORD: {{ ((databases | default({})).root_password | default(((mariadb | default({})).root_password | default(password, true)), true)) | to_json }}
    EOF

    cat > "${tmp_dir}/minecraft-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: minecraft-secret
      namespace: minecraft
    type: Opaque
    stringData:
      MINECRAFT_DB_URL1: {{ ('jdbc:' ~ databases.oss ~ '://' ~ databases.address ~ '/' ~ databases.database1.databasename) | to_json }}
      MINECRAFT_DB_URL2: {{ ('jdbc:' ~ databases.oss ~ '://' ~ databases.address ~ '/' ~ databases.database2.databasename) | to_json }}
      MINECRAFT_DB_USERNAME1: {{ databases.database1.username | to_json }}
      MINECRAFT_DB_USERNAME2: {{ databases.database2.username | to_json }}
      MINECRAFT_DB_PASSWORD1: {{ databases.database1.password | to_json }}
      MINECRAFT_DB_PASSWORD2: {{ databases.database2.password | to_json }}
      RCON_PASSWORD_SERVER1: {{
        ((app_secrets | default({})).minecraft | default({})).rcon_password_server1
        | default(((minecraft | default({})).rcon_password_server1 | default(password, true)), true)
        | to_json
      }}
      RCON_PASSWORD_SERVER2: {{
        ((app_secrets | default({})).minecraft | default({})).rcon_password_server2
        | default(((minecraft | default({})).rcon_password_server2 | default(password, true)), true)
        | to_json
      }}
    EOF

    cat > "${tmp_dir}/wordpress-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: wordpress-secret
      namespace: wordpress
    type: Opaque
    stringData:
      WORDPRESS_DB_NAME: {{ ((databases | default({})).database4 | default({})).databasename | default(((wordpress | default({})).db_name | default('wordpress', true)), true) | to_json }}
      WORDPRESS_DB_USERNAME: {{ ((databases | default({})).database4 | default({})).username | default(((wordpress | default({})).db_username | default('wordpress', true)), true) | to_json }}
      WORDPRESS_DB_PASSWORD: {{ ((databases | default({})).database4 | default({})).password | default(((wordpress | default({})).db_password | default(password, true)), true) | to_json }}
    EOF

    cat > "${tmp_dir}/navidrome-smb-secret.yml" <<'EOF'
    apiVersion: v1
    kind: Secret
    metadata:
      name: navidrome-smb-secret
      namespace: navidrome
    type: Opaque
    stringData:
      username: {{ smb.username | to_json }}
      password: {{ smb.password | to_json }}
    EOF

    for file in \
      alertmanager-discord-secret.yml \
      cloudflare-secret.yml \
      mariadb-phpmyadmin-secret.yml \
      minecraft-secret.yml \
      navidrome-smb-secret.yml \
      wordpress-secret.yml; do
      sealed_file="{{ repo_root }}/platforms/kubernetes/apps/secrets/${file}"
      kubeseal \
        --controller-name sealed-secrets \
        --controller-namespace {{ sealed_secrets_namespace }} \
        --format yaml \
        < "${tmp_dir}/${file}" \
        > "${sealed_file}"
      sed -i '1a# yamllint disable rule:line-length' "${sealed_file}"
    done
  become: false
  environment:
    KUBECONFIG: "{{ setup_user_home }}/.kube/config"
  register: _app_sealed_secret_generate
  changed_when: true
  no_log: true
  when:
    - inventory_hostname == groups['control_plane'][0]
    - not ansible_check_mode

- name: SealedSecret manifest 生成を dry-run ではスキップ
  ansible.builtin.debug:
    msg: "dry-run のため SealedSecret manifest 生成はスキップしました。"
  when:
    - inventory_hostname == groups['control_plane'][0]
    - ansible_check_mode

- name: SealedSecret manifest 生成後の Git 反映手順を案内
  ansible.builtin.debug:
    msg: >
      platforms/kubernetes/apps/secrets/*.yml を生成しました。
      setup.sh secrets が SealedSecret manifest の diff を表示し、
      承認時のみ Git commit / push と secrets Application sync を実行します。
  when:
    - inventory_hostname == groups['control_plane'][0]
    - not ansible_check_mode
