# common role task 読み込み
- name: OS 基盤準備（全ノード）
  ansible.builtin.include_tasks: os_base.yml
- name: k8s パッケージ投入（k8s ノードのみ）
  ansible.builtin.include_tasks: k8s_packages.yml
  when: inventory_hostname in (groups['k8s'] | default([]))
- name: 再起動処理（k8s ノードのみ）
  ansible.builtin.include_tasks: reboot.yml
  when: inventory_hostname in (groups['k8s'] | default([]))
