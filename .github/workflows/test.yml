# Pull Request テスト
name: Test on Pull Request
on:
  pull_request:
    branches: ["main"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Run Tests
        run: mvn test
        working-directory: platforms/applications/minecraft/greetmate
