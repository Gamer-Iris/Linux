######################################################################################################################################################
# Greetmate ビルドとリリース
name: Build and Release
on:
  workflow_dispatch:
    inputs:
      deploy_to_servers:
        description: "build した plugin を Minecraft サーバーへ deploy する"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "false"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      artifact: ${{ steps.extract.outputs.artifact }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
      - name: Extract version and artifactId from pom.xml
        id: extract
        run: |
          version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          artifact=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
        working-directory: platforms/applications/minecraft/greetmate
      - name: Check release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="v${VERSION}"
          ASSET_NAME="${ARTIFACT}-${VERSION}.jar"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG_NAME} は既に存在します。" >&2
            echo "この workflow は既存 release / tag / asset を削除・上書きしません。" >&2
            echo "再 publish する場合は platforms/applications/minecraft/greetmate/pom.xml の version bump が必要です。" >&2
            exit 1
          fi

          if [ -n "$(git ls-remote --tags origin "refs/tags/${TAG_NAME}")" ]; then
            echo "Git tag ${TAG_NAME} は origin に既に存在します。" >&2
            echo "この workflow は既存 release / tag / asset を削除・上書きしません。" >&2
            echo "再 publish する場合は platforms/applications/minecraft/greetmate/pom.xml の version bump が必要です。" >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" --json assets --jq ".assets[].name" 2>/dev/null | grep -Fx "${ASSET_NAME}" >/dev/null; then
            echo "GitHub Release asset ${ASSET_NAME} は ${TAG_NAME} に既に存在します。" >&2
            echo "この workflow は既存 release / tag / asset を削除・上書きしません。" >&2
            echo "再 publish する場合は platforms/applications/minecraft/greetmate/pom.xml の version bump が必要です。" >&2
            exit 1
          fi
      - name: Build plugin
        run: mvn clean package
        working-directory: platforms/applications/minecraft/greetmate
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: plugin-jar
          path: platforms/applications/minecraft/greetmate/target/${{ steps.extract.outputs.artifact }}-${{ steps.extract.outputs.version }}.jar
      - name: Release jar on GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.extract.outputs.artifact }} v${{ steps.extract.outputs.version }}"
          tag_name: "v${{ steps.extract.outputs.version }}"
          files: platforms/applications/minecraft/greetmate/target/${{ steps.extract.outputs.artifact }}-${{ steps.extract.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  deploy-jar:
    needs: build
    if: ${{ github.event.inputs.deploy_to_servers == 'true' }}
    environment:
      name: ${{ github.repository == 'Gamer-Iris/Linux' && 'production' || 'production' }}
    runs-on: [self-hosted]
    concurrency:
      group: minecraft-operations
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: plugin-jar
      - name: Deploy JAR through Kubernetes API
        run: |
          set -euo pipefail
          JAR_NAME="${{ needs.build.outputs.artifact }}-${{ needs.build.outputs.version }}.jar"
          ARTIFACT_ID="${{ needs.build.outputs.artifact }}"
          ensure_no_pvc_maintenance_lock() {
            KUBECTL_ERR="$(mktemp)"
            if ! RESULT="$(kubectl -n minecraft get pods \
              --field-selector metadata.name=minecraft-pvc-emergency-maintenance \
              -o name 2>"${KUBECTL_ERR}")"; then
              echo "PVC emergency maintenance Pod の状態を確認できないため、GreetMate deploy は実行できません。" >&2
              cat "${KUBECTL_ERR}" >&2
              rm -f "${KUBECTL_ERR}"
              exit 1
            fi
            rm -f "${KUBECTL_ERR}"
            if [ -n "${RESULT}" ]; then
              echo "PVC emergency maintenance 中のため、GreetMate deploy は実行できません。" >&2
              echo "${RESULT}" >&2
              exit 1
            fi
          }
          ensure_server_ready() {
            SERVER="$1"
            DESIRED="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.spec.replicas}')"
            READY="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.status.readyReplicas}')"
            AVAILABLE="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.status.availableReplicas}')"
            READY="${READY:-0}"
            AVAILABLE="${AVAILABLE:-0}"
            if [ -z "${DESIRED}" ] || [ "${DESIRED}" = "0" ]; then
              echo "${SERVER} が停止中のため、deploy は実行できません。" >&2
              exit 1
            fi
            if [ "${READY}" -lt "${DESIRED}" ] || [ "${AVAILABLE}" -lt "${DESIRED}" ]; then
              echo "${SERVER} はReady/Available replicaが不足しています。desired=${DESIRED} ready=${READY} available=${AVAILABLE}" >&2
              exit 1
            fi
            POD="$(kubectl -n minecraft get pod -l "app=${SERVER}" --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')"
            if [ -z "${POD}" ]; then
              echo "${SERVER} の Running Pod が見つかりません。" >&2
              exit 1
            fi
            kubectl -n minecraft wait pod "${POD}" --for=condition=Ready --timeout=30s
          }
          ensure_no_pvc_maintenance_lock
          for SERVER in minecraft-server1 minecraft-server2; do
            ensure_server_ready "${SERVER}"
          done
          for SERVER in minecraft-server1 minecraft-server2; do
            ensure_no_pvc_maintenance_lock
            POD="$(kubectl -n minecraft get pod -l "app=${SERVER}" --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')"
            if [ -z "${POD}" ]; then
              echo "${SERVER} の Running Pod が見つかりません。deploy 前に Minecraft deployment の状態を確認してください。" >&2
              exit 1
            fi
            kubectl -n minecraft wait pod "${POD}" --for=condition=Ready --timeout=30s
            kubectl -n minecraft exec "${POD}" -c "${SERVER}" -- sh -c "mkdir -p /data/plugins && rm -f /data/plugins/${ARTIFACT_ID}-*.jar"
            kubectl -n minecraft cp "${JAR_NAME}" "${POD}:/data/plugins/${JAR_NAME}" -c "${SERVER}"
          done
  rcon-reload:
    needs: deploy-jar
    if: ${{ github.event.inputs.deploy_to_servers == 'true' }}
    runs-on: [self-hosted]
    concurrency:
      group: minecraft-operations
      cancel-in-progress: false
    steps:
      - name: Reload Minecraft servers through in-cluster RCON Job
        run: |
          set -euo pipefail
          ensure_no_pvc_maintenance_lock() {
            KUBECTL_ERR="$(mktemp)"
            if ! RESULT="$(kubectl -n minecraft get pods \
              --field-selector metadata.name=minecraft-pvc-emergency-maintenance \
              -o name 2>"${KUBECTL_ERR}")"; then
              echo "PVC emergency maintenance Pod の状態を確認できないため、GreetMate reload は実行できません。" >&2
              cat "${KUBECTL_ERR}" >&2
              rm -f "${KUBECTL_ERR}"
              exit 1
            fi
            rm -f "${KUBECTL_ERR}"
            if [ -n "${RESULT}" ]; then
              echo "PVC emergency maintenance 中のため、GreetMate reload は実行できません。" >&2
              echo "${RESULT}" >&2
              exit 1
            fi
          }
          ensure_server_ready() {
            SERVER="$1"
            DESIRED="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.spec.replicas}')"
            READY="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.status.readyReplicas}')"
            AVAILABLE="$(kubectl -n minecraft get deployment "${SERVER}" -o jsonpath='{.status.availableReplicas}')"
            READY="${READY:-0}"
            AVAILABLE="${AVAILABLE:-0}"
            if [ -z "${DESIRED}" ] || [ "${DESIRED}" = "0" ]; then
              echo "${SERVER} が停止中のため、reload は実行できません。" >&2
              exit 1
            fi
            if [ "${READY}" -lt "${DESIRED}" ] || [ "${AVAILABLE}" -lt "${DESIRED}" ]; then
              echo "${SERVER} はReady/Available replicaが不足しています。desired=${DESIRED} ready=${READY} available=${AVAILABLE}" >&2
              exit 1
            fi
            POD="$(kubectl -n minecraft get pod -l "app=${SERVER}" --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')"
            if [ -z "${POD}" ]; then
              echo "${SERVER} の Running Pod が見つかりません。" >&2
              exit 1
            fi
            kubectl -n minecraft wait pod "${POD}" --for=condition=Ready --timeout=30s
          }
          ensure_no_pvc_maintenance_lock
          for SERVER in minecraft-server1 minecraft-server2; do
            ensure_server_ready "${SERVER}"
          done
          JOB_NAME="minecraft-rcon-greetmate-reload-${GITHUB_RUN_ID}"
          kubectl -n minecraft create job "${JOB_NAME}" --from=cronjob/minecraft-rcon-greetmate-reload
          kubectl -n minecraft wait --for=condition=complete "job/${JOB_NAME}" --timeout=180s
          kubectl -n minecraft logs "job/${JOB_NAME}"
